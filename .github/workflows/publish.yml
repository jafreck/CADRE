name: Publish @cadre-dev/cadre

# Triggered by GitHub releases (tags like v0.1.0, v1.0.0)
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    # Skip framework-only releases — those are handled by publish-framework.yml
    if: ${{ !startsWith(github.event.release.tag_name, 'framework-v') }}
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install latest npm
        run: npm install -g npm@latest

      - run: npm install --legacy-peer-deps
      - run: npm run build
      - run: npm test

      # Trusted publishing: OIDC auth via --provenance, no NPM_TOKEN needed.
      # Configure at: npmjs.com → @cadre-dev/cadre → Settings → Trusted Publisher
      #   Organization/user: jafreck
      #   Repository: CADRE
      #   Workflow filename: publish.yml
      - run: npm publish --provenance --access public
